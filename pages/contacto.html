            </div>
            <span id="spanNombre" style="color: red;"></span>
                <div>
                <label for="">Ingrese cantidad del producto:</label><input type="text" id="inputStock">
            </div>
            <span id="spanStock" style="color: red;"></span>
                <div>
                <label for="">Ingrese su correo:</label><input type="email" id="inputCorreo">
            </div>
            <span id="spanCorreo" style="color: red;"></span>
                <div>
                <label for="">Categoria:</label><select name="" id="select">
                    <option value="verduleria">Verduleria</option>
                    <option value="electronica">Electronica</option>
                    <option value="bebidas">Bebidas</option>
                </select>
                </div>
                <div class="button-container">
            <button type="submit" id="submit">Enviar</button>
            <button type="reset">Reset</button>
          </div>
            </form>
            </div>
